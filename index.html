<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header" style="position: relative;">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark theme">&#9790;</button>
      <h1>Todo List</h1>
      <p class="subtitle">Stay organized, get things done</p>
    </header>

    <form class="todo-form" id="todoForm">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="What needs to be done?"
        autocomplete="off"
        autofocus
      >
      <button type="submit" class="todo-add-btn">Add</button>
    </form>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <footer class="footer" id="footer">
      <span id="itemCount">0 items left</span>
      <button class="clear-btn" id="clearCompleted">Clear completed</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
